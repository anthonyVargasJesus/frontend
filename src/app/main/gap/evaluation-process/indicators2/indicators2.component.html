<ngx-charts-bar-vertical-stacked [scheme]="colorScheme" [results]="multi" [gradient]="gradient"
    [xAxis]="showXAxis" [yAxis]="showYAxis" [legend]="showLegend" [showXAxisLabel]="showXAxisLabel"
    [showYAxisLabel]="showYAxisLabel" [xAxisLabel]="xAxisLabel" [yAxisLabel]="yAxisLabel" [animations]="animations"
    (select)="onSelect($event)" [view]="view"  [style]="coreConfig.layout.skin === 'dark'
                            ? 'fill: #b4b7bd;'
                            : 'fill: #6e6b7b;'" >
</ngx-charts-bar-vertical-stacked>
